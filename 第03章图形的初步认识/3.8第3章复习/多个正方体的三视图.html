<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D堆叠 · 右侧中轴线居中</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111827; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
        #container {
            position: absolute;
            top: 0;
            left: 0;
            width: calc(100vw - 260px);
            height: 100vh;
        }
        #view-buttons {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 25;
            background: rgba(31,41,55,0.8);
            backdrop-filter: blur(8px);
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid #4b5563;
        }
        .view-btn {
            padding: 6px 16px;
            background: #2d3748;
            color: #e5e7eb;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #4b5563;
        }
        .view-btn:hover {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        #panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 260px;
            height: 100vh;
            background: #1f2937;
            box-shadow: -4px 0 20px rgba(0,0,0,0.5);
            padding: 20px 12px;
            overflow-y: auto;
            color: #e5e7eb;
            border-left: 1px solid #374151;
            z-index: 20;
        }
        #panel h3 {
            text-align: center;
            margin-bottom: 16px;
            font-weight: 500;
            color: #9ca3af;
            letter-spacing: 1px;
        }
        .grid-wrapper {
            position: relative;
            margin: 20px 0 30px;
            width: 100%;
        }
        .grid-panel {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
        }
        .grid-cell {
            aspect-ratio: 1;
            background: #2d3748;
            border: 1px solid #4b5563;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #f3f4f6;
            cursor: pointer;
            user-select: none;
            transition: 0.1s;
        }
        .grid-cell:hover {
            background: #3b4252;
            border-color: #6b7280;
            transform: scale(1.02);
        }
        .grid-cell:active {
            background: #4f5b6b;
        }
        .grid-cell.zero {
            color: #6b7280;
            background: #1e252e;
        }
        /* 中轴线样式 - 位于网格正中心 */
        .axis-line {
            position: absolute;
            background-color: #9ca3af;
            pointer-events: none;   /* 不干扰点击 */
            z-index: 5;
            transform: translate(-50%, -50%); /* 基于中心点偏移 */
        }
        .axis-line.vertical {
            left: 50%;
            top: 50%;
            width: 1px;
            height: 100%;
        }
        .axis-line.horizontal {
            left: 50%;
            top: 50%;
            height: 1px;
            width: 100%;
        }
        #panel button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 8px;
            border: 1px solid #2563eb;
        }
        #panel button:hover {
            background: #2563eb;
        }
        #coords {
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            margin: 12px 0 8px;
            background: #2d3748;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #4b5563;
        }
        #tips {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(31,41,55,0.9);
            backdrop-filter: blur(6px);
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            color: #e5e7eb;
            border: 1px solid #4b5563;
            z-index: 15;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #tips .highlight { color: #60a5fa; font-weight: 600; }
    </style>
</head>
<body>
    <div id="container">
        <div id="view-buttons">
            <button class="view-btn" id="frontView">主视图</button>
            <button class="view-btn" id="topView">俯视图</button>
            <button class="view-btn" id="leftView">左视图</button>
        </div>
    </div>
    <div id="tips">
        <span class="highlight">🖱️ 左侧</span> 自由旋转查看 · 三视图快速定位<br>
        <span class="highlight">右侧面板</span> 左键➕右键➖ · 行列对应左侧坐标
    </div>
    <div id="panel">
        <h3>⚒️ 10x10 控制面板</h3>
        <div class="grid-wrapper">
            <div class="grid-panel" id="grid-panel"></div>
            <!-- 两条中轴线，位于网格正中心 -->
            <div class="axis-line vertical"></div>
            <div class="axis-line horizontal"></div>
        </div>
        <div id="coords">
            <span style="color:#f87171;">列0 (X负) → 列9 (X正)</span><br>
            <span style="color:#60a5fa;">行0 (Z负) → 行9 (Z正)</span>
        </div>
        <button id="clearAll">清空所有格子</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <script>
        (function() {
            // --- 初始化场景 ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e293b);

            const leftWidth = window.innerWidth - 260;
            const leftHeight = window.innerHeight;

            const camera = new THREE.PerspectiveCamera(30, leftWidth / leftHeight, 0.1, 1000);
            camera.position.set(10, 10, 15);
            camera.lookAt(0, 2, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(leftWidth, leftHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('container').appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.rotateSpeed = 0.8;
            controls.minDistance = 5;
            controls.maxDistance = 60;
            controls.target.set(0, 2, 0);
            controls.enablePan = true;
            controls.mouseButtons = {
                LEFT: THREE.MOUSE.ROTATE,
                MIDDLE: THREE.MOUSE.DOLLY,
                RIGHT: THREE.MOUSE.PAN
            };

            // --- 10x10网格 ---
            const grid = new THREE.GridHelper(10, 10, 0x94a3b8, 0x475569);
            grid.position.y = 0;
            scene.add(grid);

            // --- 数据存储 ---
            const gridData = Array(10).fill(0).map(() => Array(10).fill(0));
            const cubeMap = new Map();

            // --- 工具函数：根据行列获取格子中心坐标 (行0 -> Z负, 行9 -> Z正) ---
            function getCoordFromRowCol(row, col) {
                const x = col - 4.5;               // col 0 -> -4.5, col 9 -> 4.5
                const z = -4.5 + row;                // row 0 -> -4.5, row 9 -> 4.5
                return { x, z };
            }

            // --- 创建单个立方体 ---
            function createCubeAt(x, y, z) {
                const geo = new THREE.BoxGeometry(1, 1, 1);
                const mat = new THREE.MeshBasicMaterial({ 
                    color: 0x60a5fa,
                    polygonOffset: true,
                    polygonOffsetFactor: 1,
                    polygonOffsetUnits: 1
                });
                const cubeMesh = new THREE.Mesh(geo, mat);
                
                const edges = new THREE.EdgesGeometry(geo);
                const lineMat = new THREE.LineBasicMaterial({ color: 0x1e293b });
                const wireframe = new THREE.LineSegments(edges, lineMat);
                
                const group = new THREE.Group();
                group.add(cubeMesh);
                group.add(wireframe);
                group.position.set(x, y + 0.5, z);
                group.userData.key = `${x},${y},${z}`;
                return group;
            }

            // --- 更新某个格子的立方体数量 ---
            function updateGridCell(row, col, newCount) {
                const { x, z } = getCoordFromRowCol(row, col);
                for (let y = 0; y < 10; y++) {
                    const key = `${x},${y},${z}`;
                    const group = cubeMap.get(key);
                    if (group) {
                        scene.remove(group);
                        cubeMap.delete(key);
                    }
                }
                for (let y = 0; y < newCount; y++) {
                    const group = createCubeAt(x, y, z);
                    scene.add(group);
                    cubeMap.set(group.userData.key, group);
                }
            }

            // --- 刷新整个网格 ---
            function refreshAllCubes() {
                cubeMap.forEach(group => scene.remove(group));
                cubeMap.clear();
                for (let r = 0; r < 10; r++) {
                    for (let c = 0; c < 10; c++) {
                        const count = gridData[r][c];
                        if (count === 0) continue;
                        const { x, z } = getCoordFromRowCol(r, c);
                        for (let y = 0; y < count; y++) {
                            const group = createCubeAt(x, y, z);
                            scene.add(group);
                            cubeMap.set(group.userData.key, group);
                        }
                    }
                }
            }

            // --- 右侧面板交互 ---
            const panel = document.getElementById('grid-panel');
            const cells = [];

            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 10; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell zero';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.textContent = '0';
                    
                    cell.addEventListener('click', (e) => {
                        e.preventDefault();
                        const row = parseInt(e.currentTarget.dataset.row);
                        const col = parseInt(e.currentTarget.dataset.col);
                        if (gridData[row][col] < 9) {
                            gridData[row][col]++;
                            e.currentTarget.textContent = gridData[row][col];
                            e.currentTarget.classList.toggle('zero', gridData[row][col] === 0);
                            updateGridCell(row, col, gridData[row][col]);
                        }
                    });

                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        const row = parseInt(e.currentTarget.dataset.row);
                        const col = parseInt(e.currentTarget.dataset.col);
                        if (gridData[row][col] > 0) {
                            gridData[row][col]--;
                            e.currentTarget.textContent = gridData[row][col];
                            e.currentTarget.classList.toggle('zero', gridData[row][col] === 0);
                            updateGridCell(row, col, gridData[row][col]);
                        }
                    });

                    panel.appendChild(cell);
                    cells.push(cell);
                }
            }

            // 清空所有按钮
            document.getElementById('clearAll').addEventListener('click', () => {
                for (let r = 0; r < 10; r++) {
                    for (let c = 0; c < 10; c++) {
                        gridData[r][c] = 0;
                    }
                }
                cells.forEach(cell => {
                    cell.textContent = '0';
                    cell.classList.add('zero');
                });
                refreshAllCubes();
            });

            // 初始全0
            refreshAllCubes();

            // --- 三视图切换 (主/左视图保持原方向，俯视图使用up=-Z使屏幕上方对应Z负) ---
            function setView(position, up) {
                camera.position.copy(position);
                camera.up.copy(up);
                controls.target.set(0, 2, 0);
                camera.lookAt(0, 2, 0);
                controls.update();
            }

            document.getElementById('frontView').addEventListener('click', () => {
                setView(new THREE.Vector3(0, 2, 25), new THREE.Vector3(0, 1, 0));
            });
            document.getElementById('topView').addEventListener('click', () => {
                setView(new THREE.Vector3(0, 25, 0), new THREE.Vector3(0, 0, -1)); // up指向-Z，使屏幕上方为Z负
            });
            document.getElementById('leftView').addEventListener('click', () => {
                setView(new THREE.Vector3(-25, 2, 0), new THREE.Vector3(0, 1, 0));
            });

            // --- 窗口自适应 ---
            window.addEventListener('resize', () => {
                const width = window.innerWidth - 260;
                const height = window.innerHeight;
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            });

            // --- 动画循环 ---
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
        })();
    </script>
</body>
</html>
