<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三视图重建 · 6x6 立体生成器 (立方体位于方格内)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111827; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
        #container {
            position: absolute;
            top: 0;
            left: 0;
            width: calc(100vw - 300px);
            height: 100vh;
        }
        #view-buttons {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 25;
            background: rgba(31,41,55,0.8);
            backdrop-filter: blur(8px);
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid #4b5563;
        }
        .view-btn {
            padding: 6px 16px;
            background: #2d3748;
            color: #e5e7eb;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #4b5563;
        }
        .view-btn:hover {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        #panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 100vh;
            background: #1f2937;
            box-shadow: -4px 0 20px rgba(0,0,0,0.5);
            padding: 20px 15px;
            overflow-y: auto;
            color: #e5e7eb;
            border-left: 1px solid #374151;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        #panel h3 {
            text-align: center;
            margin-bottom: 16px;
            font-weight: 500;
            color: #9ca3af;
            letter-spacing: 1px;
            width: 100%;
        }
        .view-section {
            margin-bottom: 20px;
            width: 100%;
        }
        .view-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #d1d5db;
            text-align: left;
            width: 140px;
        }
        .grid-panel {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            background: #2d3748;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #4b5563;
            width: 140px;
            height: 140px;
        }
        .grid-cell {
            aspect-ratio: 1 / 1;
            background: #1e252e;
            border: 1px solid #4b5563;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.1s;
        }
        .grid-cell.filled {
            background: #3b82f6;
            border-color: #60a5fa;
        }
        .grid-cell:hover {
            background: #3b4252;
            border-color: #6b7280;
        }
        .grid-cell.filled:hover {
            background: #2563eb;
        }
        .row2 {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            width: 100%;
        }
        .row2 > div {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        #clearBtn {
            width: 140px;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 8px;
            border: 1px solid #2563eb;
            align-self: flex-start;
        }
        #clearBtn:hover {
            background: #2563eb;
        }
        #tips {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(31,41,55,0.9);
            backdrop-filter: blur(6px);
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            color: #e5e7eb;
            border: 1px solid #4b5563;
            z-index: 15;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #tips .highlight { color: #60a5fa; font-weight: 600; }
    </style>
</head>
<body>
    <div id="container">
        <div id="view-buttons">
            <button class="view-btn" id="frontView">主视图</button>
            <button class="view-btn" id="topView">俯视图</button>
            <button class="view-btn" id="leftView">左视图</button>
        </div>
    </div>
    <div id="tips">
        <span class="highlight">🖱️ 左侧</span> 自由旋转查看 · 三视图快速定位<br>
        <span class="highlight">右侧面板</span> 左键填充｜右键清除 · 立方体在方格内
    </div>
    <div id="panel">
        <h3>⚡ 三视图控制 (6x6)</h3>
        
        <div class="row2">
            <div>
                <div class="view-title">主视图</div>
                <div class="grid-panel" id="front-panel"></div>
            </div>
            <div>
                <div class="view-title">左视图</div>
                <div class="grid-panel" id="left-panel"></div>
            </div>
        </div>

        <div class="view-section">
            <div class="view-title">俯视图</div>
            <div class="grid-panel" id="top-panel"></div>
        </div>

        <button id="clearBtn">清空所有方格</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <script>
        (function() {
            // --- 初始化 Three.js 场景 (范围0-5) ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e293b);

            const leftWidth = window.innerWidth - 300;
            const leftHeight = window.innerHeight;

            const camera = new THREE.PerspectiveCamera(45, leftWidth / leftHeight, 0.1, 100);
            camera.position.set(5, 5, 10);
            camera.lookAt(2.5, 2.5, 2.5);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(leftWidth, leftHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('container').appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.rotateSpeed = 0.8;
            controls.target.set(2.5, 2.5, 2.5);
            controls.enablePan = true;
            controls.mouseButtons = {
                LEFT: THREE.MOUSE.ROTATE,
                MIDDLE: THREE.MOUSE.DOLLY,
                RIGHT: THREE.MOUSE.PAN
            };

            // --- 6x6 网格：放置在 (3,0,3) 使网格线位于整数坐标 0..6 ---
            const grid = new THREE.GridHelper(6, 6, 0x94a3b8, 0x475569);
            grid.position.set(3, 0, 3);  // 修改：从 (2.5,0,2.5) 改为 (3,0,3)
            scene.add(grid);

            // 半透明边界框：位置对应 (3,3,3)，范围 0-6
            const boxGeo = new THREE.BoxGeometry(6, 6, 6);
            const boxMat = new THREE.MeshBasicMaterial({ color: 0x4b5563, wireframe: true, transparent: true, opacity: 0.2 });
            const boundary = new THREE.Mesh(boxGeo, boxMat);
            boundary.position.set(3, 3, 3);  // 修改：从 (2.5,2.5,2.5) 改为 (3,3,3)
            scene.add(boundary);

            // --- 数据存储 ---
            const front = Array(6).fill(0).map(() => Array(6).fill(0)); // front[y][x]
            const left = Array(6).fill(0).map(() => Array(6).fill(0));  // left[y][z]
            const top = Array(6).fill(0).map(() => Array(6).fill(0));   // top[z][x]

            const cubes = [];

            function createCubeAt(x, y, z) {
                const geo = new THREE.BoxGeometry(1, 1, 1);
                const mat = new THREE.MeshBasicMaterial({ 
                    color: 0x60a5fa,
                    polygonOffset: true,
                    polygonOffsetFactor: 1,
                    polygonOffsetUnits: 1
                });
                const cubeMesh = new THREE.Mesh(geo, mat);
                
                const edges = new THREE.EdgesGeometry(geo);
                const lineMat = new THREE.LineBasicMaterial({ color: 0x1e293b });
                const wireframe = new THREE.LineSegments(edges, lineMat);
                
                const group = new THREE.Group();
                group.add(cubeMesh);
                group.add(wireframe);
                group.position.set(x + 0.5, y + 0.5, z + 0.5); // 格子中心
                return group;
            }

            // --- 重建模型：主视图和左视图上下调换，俯视图保持原样 (行z对应空间z) ---
            function rebuildModel() {
                cubes.forEach(cube => scene.remove(cube));
                cubes.length = 0;

                for (let x = 0; x < 6; x++) {
                    for (let y = 0; y < 6; y++) {
                        for (let z = 0; z < 6; z++) {
                            // 主视图使用 5-y 作为行索引，左视图也使用 5-y
                            if (front[5 - y][x] === 1 && left[5 - y][z] === 1 && top[z][x] === 1) {
                                const cube = createCubeAt(x, y, z);
                                scene.add(cube);
                                cubes.push(cube);
                            }
                        }
                    }
                }
            }

            // --- 初始化面板 ---
            function initPanel(panelId, dataArray, viewType) {
                const panel = document.getElementById(panelId);
                panel.innerHTML = '';
                for (let r = 0; r < 6; r++) {
                    for (let c = 0; c < 6; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'grid-cell';
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        
                        if (dataArray[r][c] === 1) cell.classList.add('filled');

                        cell.addEventListener('click', (e) => {
                            e.preventDefault();
                            const row = parseInt(e.currentTarget.dataset.row);
                            const col = parseInt(e.currentTarget.dataset.col);
                            if (viewType === 'front') front[row][col] = 1;
                            else if (viewType === 'left') left[row][col] = 1;
                            else if (viewType === 'top') top[row][col] = 1;
                            e.currentTarget.classList.add('filled');
                            rebuildModel();
                        });

                        cell.addEventListener('contextmenu', (e) => {
                            e.preventDefault();
                            const row = parseInt(e.currentTarget.dataset.row);
                            const col = parseInt(e.currentTarget.dataset.col);
                            if (viewType === 'front') front[row][col] = 0;
                            else if (viewType === 'left') left[row][col] = 0;
                            else if (viewType === 'top') top[row][col] = 0;
                            e.currentTarget.classList.remove('filled');
                            rebuildModel();
                        });

                        panel.appendChild(cell);
                    }
                }
            }

            initPanel('front-panel', front, 'front');
            initPanel('left-panel', left, 'left');
            initPanel('top-panel', top, 'top');

            document.getElementById('clearBtn').addEventListener('click', () => {
                for (let i = 0; i < 6; i++) {
                    for (let j = 0; j < 6; j++) {
                        front[i][j] = 0;
                        left[i][j] = 0;
                        top[i][j] = 0;
                    }
                }
                document.querySelectorAll('#front-panel .grid-cell').forEach(cell => cell.classList.remove('filled'));
                document.querySelectorAll('#left-panel .grid-cell').forEach(cell => cell.classList.remove('filled'));
                document.querySelectorAll('#top-panel .grid-cell').forEach(cell => cell.classList.remove('filled'));
                rebuildModel();
            });

            // --- 视角切换 ---
            function setView(position, up) {
                camera.position.copy(position);
                camera.up.copy(up);
                controls.target.set(2.5, 2.5, 2.5);
                camera.lookAt(2.5, 2.5, 2.5);
                controls.update();
            }

            document.getElementById('frontView').addEventListener('click', () => {
                setView(new THREE.Vector3(2.5, 2.5, 15), new THREE.Vector3(0, 1, 0));
            });
            document.getElementById('topView').addEventListener('click', () => {
                // 俯视图：up 指向 -Z，使屏幕上方对应 Z 负方向
                setView(new THREE.Vector3(2.5, 15, 2.5), new THREE.Vector3(0, 0, -1));
            });
            document.getElementById('leftView').addEventListener('click', () => {
                setView(new THREE.Vector3(-15, 2.5, 2.5), new THREE.Vector3(0, 1, 0));
            });

            window.addEventListener('resize', () => {
                const width = window.innerWidth - 300;
                const height = window.innerHeight;
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            });

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();

            // 初始示例：一个位于左下角底部的小方块（X=0,1; Y=0,1; Z=0,1）
            (function demo() {
                for (let y = 0; y < 2; y++) {
                    for (let x = 0; x < 2; x++) {
                        front[5 - y][x] = 1;  // 空间Y=y，主视图行=5-y
                    }
                }
                for (let y = 0; y < 2; y++) {
                    for (let z = 0; z < 2; z++) {
                        left[5 - y][z] = 1;    // 空间Y=y，左视图行=5-y
                    }
                }
                for (let z = 0; z < 2; z++) {
                    for (let x = 0; x < 2; x++) {
                        top[z][x] = 1;         // 俯视图行=z (z=0近处)
                    }
                }
                // 更新UI
                document.querySelectorAll('#front-panel .grid-cell').forEach((cell, idx) => {
                    const r = Math.floor(idx / 6);
                    const c = idx % 6;
                    if (front[r][c]) cell.classList.add('filled');
                });
                document.querySelectorAll('#left-panel .grid-cell').forEach((cell, idx) => {
                    const r = Math.floor(idx / 6);
                    const c = idx % 6;
                    if (left[r][c]) cell.classList.add('filled');
                });
                document.querySelectorAll('#top-panel .grid-cell').forEach((cell, idx) => {
                    const r = Math.floor(idx / 6);
                    const c = idx % 6;
                    if (top[r][c]) cell.classList.add('filled');
                });
                rebuildModel();
            })();
        })();
    </script>
</body>
</html>
