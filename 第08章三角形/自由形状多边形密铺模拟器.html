<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由形状多边形密铺模拟器（两种特殊六边形）</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #eef2f5;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            display: flex;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,20,40,0.25);
            overflow: hidden;
            max-width: 1300px;
            width: 100%;
        }
        .canvas-left {
            flex: 3;
            background: #fafbfc;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-right: 2px solid #d0ddee;
        }
        #mainCanvas {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 100%;
            height: auto;
            display: block;
            cursor: crosshair;
        }
        .panel-right {
            flex: 1.2;
            background: #f5f9ff;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            max-height: 800px;
        }
        .section-title {
            color: #1e4b6e;
            font-weight: 600;
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            border-left: 6px solid #3f8ab3;
            padding-left: 10px;
        }
        .small-canvas-container {
            background: #eaf2fa;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.05);
        }
        #editCanvas {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;
            height: auto;
            display: block;
            cursor: grab;
        }
        .edit-hint {
            font-size: 0.85rem;
            color: #2c5a7a;
            margin-top: 8px;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 5px 0;
        }
        .btn {
            background: white;
            border: 2px solid #2b7a9c;
            border-radius: 40px;
            padding: 10px 0;
            font-size: 1rem;
            font-weight: 600;
            color: #1b5370;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 0 #9bb7d4;
            text-align: center;
            outline: none;
        }
        .btn:hover {
            background: #e3f0fd;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #9bb7d4;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #9bb7d4;
        }
        .btn.active {
            background: #ffd966;
            border-color: #b37b2e;
            color: #5d3f1a;
            box-shadow: 0 4px 0 #b37b2e;
        }
        .btn.special {
            background: #d9e8f5;
            border-color: #5a6f8c;
            color: #1f3b5a;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        .btn.undo {
            background: #e0d5f5;
            border-color: #6b4f8f;
            color: #3d2b5a;
            flex: 1;
        }
        .btn.clear {
            background: #fff3cd;
            border-color: #c49b3f;
            color: #7a5a1a;
            flex: 1;
        }
        .btn.norm {
            background: #c5e0b4;
            border-color: #3f7842;
            color: #1f4a22;
        }
        .info-box {
            background: #e2eaf3;
            border-radius: 18px;
            padding: 12px;
            font-size: 0.9rem;
            color: #113750;
            line-height: 1.5;
        }
        .info-box p {
            margin: 6px 0;
        }
        .highlight {
            color: #b34b00;
            font-weight: bold;
        }
        .rotate-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .rotate-btn {
            flex: 1;
            background: #cfe2f3;
            border: 2px solid #2b6f9c;
            border-radius: 40px;
            padding: 8px 0;
            font-size: 1rem;
            font-weight: 600;
            color: #1b3f5a;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 0 #9bb7d4;
        }
        .rotate-btn.active {
            background: #ffd966;
            border-color: #b37b2e;
            color: #5d3f1a;
            box-shadow: 0 4px 0 #b37b2e;
        }
        .rotate-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #9bb7d4;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="canvas-left">
        <canvas id="mainCanvas" width="700" height="600"></canvas>
    </div>
    <div class="panel-right">
        <div class="small-canvas-container">
            <div style="font-weight: 600; color: #1b5370; margin-bottom: 6px;">✎ 拖拽顶点调整形状</div>
            <canvas id="editCanvas" width="200" height="200"></canvas>
            <div class="edit-hint">当前边数: <span id="edgeCountDisplay">3</span></div>
        </div>

        <div>
            <div class="section-title">选择多边形类型</div>
            <div class="button-grid">
                <button class="btn active" id="btnTriangle">🔺 三角形</button>
                <button class="btn" id="btnQuad">⬛ 四边形</button>
                <button class="btn special" id="btnSpecialHexA">🔷 特殊六边形A<br><small>(对边平行随机)</small></button>
                <button class="btn special" id="btnSpecialHexB">🔶 特殊六边形B<br><small>(凸六边形,邻边相等120°)</small></button>
            </div>
        </div>

        <div id="rotatePanel" style="display: none;">
            <div class="section-title">旋转角度</div>
            <div class="rotate-buttons">
                <div class="rotate-btn" id="rotate0">0°</div>
                <div class="rotate-btn" id="rotate120">120°</div>
                <div class="rotate-btn" id="rotate240">240°</div>
            </div>
        </div>

        <div>
            <div class="section-title">形状调整</div>
            <button class="btn norm" id="normalizeBtn">📐 标准化（正多边形）</button>
        </div>

        <div>
            <div class="section-title">放置操作</div>
            <div class="action-buttons">
                <button class="btn undo" id="undoBtn">↩️ 撤销</button>
                <button class="btn clear" id="clearBtn">🗑️ 清空</button>
            </div>
            <div class="info-box" id="infoText">
                <p>• 点击画布手动放置当前形状（自动贴合最近的等长边）</p>
                <p>• 当前形状顶点可拖拽调整</p>
                <p>• 标准化：变为正多边形，保持第一条边方向</p>
                <p>• 固定缩放比例，各边长度由拖拽决定</p>
                <p>• 特殊六边形A: 对边平行随机</p>
                <p>• 特殊六边形B: 邻边相等，每对相等边夹角120°，可旋转后放置</p>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const MAIN_WIDTH = 700, MAIN_HEIGHT = 600;
    const EDIT_SIZE = 200;
    const BASE_SCALE = 40; // 相对坐标缩放因子

    const mainCanvas = document.getElementById('mainCanvas');
    const mainCtx = mainCanvas.getContext('2d');
    const editCanvas = document.getElementById('editCanvas');
    const editCtx = editCanvas.getContext('2d');
    const edgeSpan = document.getElementById('edgeCountDisplay');
    const rotatePanel = document.getElementById('rotatePanel');
    const rotate0 = document.getElementById('rotate0');
    const rotate120 = document.getElementById('rotate120');
    const rotate240 = document.getElementById('rotate240');

    let placedPolygons = []; // 每个元素: { worldVerts, color }
    let currentVertices = []; // 相对坐标，中心(0,0)，由用户拖拽决定
    let currentSides = 3;

    // 当前选中的多边形类型
    let currentType = 'triangle';
    // 特殊六边形B的当前旋转角度索引 (0:0°, 1:120°, 2:240°)
    let currentRotIndex = 0;
    // 存储特殊B的边长组（相对长度），用于显示
    let currentEdgeLengths = null; // [a, b, c]

    let dragging = false;
    let dragIndex = -1;

    const btnTriangle = document.getElementById('btnTriangle');
    const btnQuad = document.getElementById('btnQuad');
    const btnSpecialHexA = document.getElementById('btnSpecialHexA');
    const btnSpecialHexB = document.getElementById('btnSpecialHexB');
    const undoBtn = document.getElementById('undoBtn');
    const clearBtn = document.getElementById('clearBtn');
    const normalizeBtn = document.getElementById('normalizeBtn');

    // ---------- 基础函数 ----------
    function generateRegularPolygon(sides) {
        const verts = [];
        const r = 0.7;
        for (let i = 0; i < sides; i++) {
            const angle = -Math.PI/2 + i * 2*Math.PI/sides; // 第一条边大致朝右
            verts.push({ x: r * Math.cos(angle), y: r * Math.sin(angle) });
        }
        return verts;
    }

    // 对边平行相等类六边形（基于两个向量u,v）
    function generateParallelHexagon() {
        const rand = (min, max) => min + Math.random() * (max - min);
        // 随机范围 0.3~0.8
        let u = { x: rand(0.3, 0.8), y: rand(0.3, 0.8) };
        let v = { x: rand(0.3, 0.8), y: rand(0.3, 0.8) };
        // 随机符号
        if (Math.random() > 0.5) u.x *= -1;
        if (Math.random() > 0.5) u.y *= -1;
        if (Math.random() > 0.5) v.x *= -1;
        if (Math.random() > 0.5) v.y *= -1;
        let verts = [
            { x: u.x, y: u.y },
            { x: u.x + v.x, y: u.y + v.y },
            { x: v.x, y: v.y },
            { x: -u.x, y: -u.y },
            { x: -u.x - v.x, y: -u.y - v.y },
            { x: -v.x, y: -v.y }
        ];
        // 平移到中心在原点
        const center = getCenter(verts);
        return verts.map(v => ({ x: v.x - center.cx, y: v.y - center.cy }));
    }

    // 检查多边形是否为凸 (所有叉积同号)
    function isConvex(verts) {
        if (verts.length < 3) return false;
        let prev = 0;
        for (let i = 0; i < verts.length; i++) {
            const p1 = verts[i];
            const p2 = verts[(i+1) % verts.length];
            const p3 = verts[(i+2) % verts.length];
            const v1 = { x: p2.x - p1.x, y: p2.y - p1.y };
            const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
            const cross = v1.x * v2.y - v1.y * v2.x;
            if (i === 0) prev = Math.sign(cross);
            else if (Math.sign(cross) !== prev) return false;
        }
        return true;
    }

    // 邻边相等六边形：边长a,a,b,b,c,c，每对相等边夹角120°，保证凸性
    // 返回 {verts, lengths}
    function generateAdjacentEqualHexagon() {
        const maxAttempts = 100;
        for (let attempt = 0; attempt < maxAttempts; attempt++) {
            // 随机生成边长 a,b 在 0.4~1.0 之间
            const a = 0.4 + Math.random() * 0.6;
            const b = 0.4 + Math.random() * 0.6;
            // 随机夹角 φ 在 60° 到 120° 之间，确保凸性
            const phi = (60 + Math.random() * 60) * Math.PI / 180;
            // 计算 c = |a e^(i0) + b e^(iφ)|
            const cx = a + b * Math.cos(phi);
            const cy = b * Math.sin(phi);
            const c = Math.hypot(cx, cy);
            // 计算 θ5 = arg(-a e^(i0) - b e^(iφ))
            const theta5 = Math.atan2(-cy, -cx);
            // 六个边的方向（弧度）
            const theta1 = 0;
            const theta2 = Math.PI/3; // 60°
            const theta3 = phi;
            const theta4 = phi + Math.PI/3;
            const theta5_ = theta5;
            const theta6 = theta5 + Math.PI/3;
            // 从原点出发，依次走边
            let points = [];
            let x = 0, y = 0;
            // 第一个边 a 方向 theta1
            x += a * Math.cos(theta1);
            y += a * Math.sin(theta1);
            points.push({x, y});
            // 第二个边 a 方向 theta2
            x += a * Math.cos(theta2);
            y += a * Math.sin(theta2);
            points.push({x, y});
            // 第三个边 b 方向 theta3
            x += b * Math.cos(theta3);
            y += b * Math.sin(theta3);
            points.push({x, y});
            // 第四个边 b 方向 theta4
            x += b * Math.cos(theta4);
            y += b * Math.sin(theta4);
            points.push({x, y});
            // 第五个边 c 方向 theta5
            x += c * Math.cos(theta5_);
            y += c * Math.sin(theta5_);
            points.push({x, y});
            // 第六个边 c 方向 theta6
            x += c * Math.cos(theta6);
            y += c * Math.sin(theta6);
            // 将原点也加入顶点列表，形成闭合多边形
            let verts = [{x:0, y:0}, ...points];
            // 平移到中心在原点
            const center = getCenter(verts);
            verts = verts.map(v => ({ x: v.x - center.cx, y: v.y - center.cy }));
            // 检查凸性
            if (isConvex(verts)) {
                return { verts, lengths: [a, b, c] };
            }
        }
        // 如果尝试多次失败，返回一个默认凸六边形（正六边形）
        const defaultVerts = generateRegularPolygon(6);
        const a = Math.hypot(defaultVerts[1].x - defaultVerts[0].x, defaultVerts[1].y - defaultVerts[0].y);
        return { verts: defaultVerts, lengths: [a, a, a] };
    }

    // 旋转顶点数组（相对坐标）指定角度（弧度）
    function rotateVertices(verts, angleRad) {
        const cos = Math.cos(angleRad);
        const sin = Math.sin(angleRad);
        return verts.map(v => ({
            x: v.x * cos - v.y * sin,
            y: v.x * sin + v.y * cos
        }));
    }

    // 获取当前要显示的顶点（考虑旋转）
    function getDisplayVertices() {
        if (currentType === 'specialB') {
            const rotAngle = currentRotIndex * 2 * Math.PI / 3; // 120° * index
            return rotateVertices(currentVertices, rotAngle);
        } else {
            return currentVertices;
        }
    }

    function relToEditCanvas(verts) {
        const scale = 70;
        return verts.map(v => ({ x: 100 + v.x * scale, y: 100 + v.y * scale }));
    }

    function drawEditCanvas() {
        editCtx.clearRect(0, 0, EDIT_SIZE, EDIT_SIZE);
        editCtx.strokeStyle = "#eaeef5";
        editCtx.lineWidth = 0.5;
        for (let i = 0; i <= EDIT_SIZE; i += 20) {
            editCtx.beginPath(); editCtx.moveTo(i, 0); editCtx.lineTo(i, EDIT_SIZE); editCtx.stroke();
            editCtx.beginPath(); editCtx.moveTo(0, i); editCtx.lineTo(EDIT_SIZE, i); editCtx.stroke();
        }
        const displayVerts = getDisplayVertices();
        const pts = relToEditCanvas(displayVerts);
        if (pts.length > 2) {
            // 根据类型和角度设置预览颜色
            let previewColor = "#f0f7fe"; // 默认
            if (currentType === 'specialA') {
                previewColor = "#F9CB9C"; // 橙色
            } else if (currentType === 'specialB') {
                if (currentRotIndex === 0) previewColor = "#F9CB9C"; // 橙色
                else if (currentRotIndex === 1) previewColor = "#6FA8DC"; // 蓝色
                else if (currentRotIndex === 2) previewColor = "#B4A7D6"; // 紫色
            }
            editCtx.beginPath();
            editCtx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) editCtx.lineTo(pts[i].x, pts[i].y);
            editCtx.closePath();
            editCtx.fillStyle = previewColor;
            editCtx.fill();
            editCtx.strokeStyle = "#1e3a5f";
            editCtx.lineWidth = 2;
            editCtx.stroke();
            // 顶点
            pts.forEach((p, i) => {
                editCtx.beginPath();
                editCtx.arc(p.x, p.y, 5, 0, 2*Math.PI);
                editCtx.fillStyle = "#ffb347";
                editCtx.fill();
                editCtx.strokeStyle = "#a05a1a";
                editCtx.lineWidth = 2;
                editCtx.stroke();
            });
        }
        edgeSpan.textContent = currentSides;
    }

    // 获取多边形中心
    function getCenter(verts) {
        let cx = 0, cy = 0;
        verts.forEach(v => { cx += v.x; cy += v.y; });
        return { cx: cx / verts.length, cy: cy / verts.length };
    }

    // 从相对顶点生成世界顶点（中心cx,cy，旋转角angle），使用固定缩放因子BASE_SCALE
    function relToWorld(relVerts, cx, cy, angle) {
        return relVerts.map(v => {
            let x = v.x * Math.cos(angle) - v.y * Math.sin(angle);
            let y = v.x * Math.sin(angle) + v.y * Math.cos(angle);
            return { x: cx + x * BASE_SCALE, y: cy + y * BASE_SCALE };
        });
    }

    // 绘制主画布
    function drawMainCanvas() {
        mainCtx.clearRect(0, 0, MAIN_WIDTH, MAIN_HEIGHT);
        mainCtx.strokeStyle = "#eaeef5";
        mainCtx.lineWidth = 0.5;
        for (let i = 0; i <= MAIN_WIDTH; i += 20) {
            mainCtx.beginPath(); mainCtx.moveTo(i, 0); mainCtx.lineTo(i, MAIN_HEIGHT); mainCtx.stroke();
        }
        for (let i = 0; i <= MAIN_HEIGHT; i += 20) {
            mainCtx.beginPath(); mainCtx.moveTo(0, i); mainCtx.lineTo(MAIN_WIDTH, i); mainCtx.stroke();
        }
        placedPolygons.forEach((poly) => {
            const verts = poly.worldVerts;
            if (verts.length < 3) return;
            mainCtx.beginPath();
            mainCtx.moveTo(verts[0].x, verts[0].y);
            for (let i = 1; i < verts.length; i++) mainCtx.lineTo(verts[i].x, verts[i].y);
            mainCtx.closePath();
            mainCtx.fillStyle = poly.color;
            mainCtx.fill();
            mainCtx.strokeStyle = "#1e3a5f";
            mainCtx.lineWidth = 2;
            mainCtx.stroke();
        });
    }

    // 更新旋转按钮激活状态
    function updateRotateButtons() {
        [rotate0, rotate120, rotate240].forEach((btn, idx) => {
            if (idx === currentRotIndex) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        drawEditCanvas(); // 重绘小画布
    }

    // 类型切换
    function setPolygonType(type) {
        currentType = type;
        switch (type) {
            case 'triangle':
                currentVertices = generateRegularPolygon(3);
                currentSides = 3;
                currentEdgeLengths = null;
                rotatePanel.style.display = 'none';
                break;
            case 'quad':
                currentVertices = generateRegularPolygon(4);
                currentSides = 4;
                currentEdgeLengths = null;
                rotatePanel.style.display = 'none';
                break;
            case 'specialA':
                currentVertices = generateParallelHexagon();
                currentSides = 6;
                currentEdgeLengths = null;
                rotatePanel.style.display = 'none';
                break;
            case 'specialB':
                const result = generateAdjacentEqualHexagon();
                currentVertices = result.verts;
                currentSides = 6;
                currentEdgeLengths = result.lengths;
                currentRotIndex = 0;
                updateRotateButtons();
                rotatePanel.style.display = 'block';
                break;
        }
        updateActiveButton(type);
        drawEditCanvas();
    }

    function updateActiveButton(type) {
        [btnTriangle, btnQuad, btnSpecialHexA, btnSpecialHexB].forEach(b => b.classList.remove('active'));
        switch (type) {
            case 'triangle': btnTriangle.classList.add('active'); break;
            case 'quad': btnQuad.classList.add('active'); break;
            case 'specialA': btnSpecialHexA.classList.add('active'); break;
            case 'specialB': btnSpecialHexB.classList.add('active'); break;
        }
    }

    // 标准化：变为正多边形，保持第一条边方向
    function normalizePolygon() {
        const regular = generateRegularPolygon(currentSides);
        const v0 = currentVertices[0], v1 = currentVertices[1];
        const currentAngle = Math.atan2(v1.y - v0.y, v1.x - v0.x);
        const r0 = regular[0], r1 = regular[1];
        const regAngle = Math.atan2(r1.y - r0.y, r1.x - r0.x);
        const delta = currentAngle - regAngle;
        currentVertices = regular.map(v => ({
            x: v.x * Math.cos(delta) - v.y * Math.sin(delta),
            y: v.x * Math.sin(delta) + v.y * Math.cos(delta)
        }));
        if (currentType === 'specialB') {
            // 标准化后所有边相等，更新边长组
            const a = Math.hypot(currentVertices[1].x - currentVertices[0].x, currentVertices[1].y - currentVertices[0].y);
            currentEdgeLengths = [a, a, a];
        }
        drawEditCanvas();
    }

    // ---------- 核心放置函数（增加角度容差） ----------
    function placeOnEdge(poly, edgeIndex, shapeVerts, allowRotation = true) {
        const verts = poly.worldVerts;
        const i = edgeIndex;
        const v1 = verts[i];
        const v2 = verts[(i + 1) % verts.length];

        const rel = shapeVerts; // 要放置的形状顶点
        const n = rel.length;

        const targetDirX = v1.x - v2.x;
        const targetDirY = v1.y - v2.y;
        const targetLen = Math.hypot(targetDirX, targetDirY);
        if (targetLen < 1e-6) return null;

        const tolerance = 0.05; // 长度容差5%

        if (allowRotation) {
            // 允许旋转：寻找长度匹配的边，然后计算旋转角度
            const targetRelLen = targetLen / BASE_SCALE;
            let bestEdgeIdx = -1;
            let bestDiff = tolerance;
            for (let k = 0; k < n; k++) {
                const a = rel[k];
                const b = rel[(k + 1) % n];
                const relLen = Math.hypot(b.x - a.x, b.y - a.y);
                if (Math.abs(relLen - targetRelLen) < bestDiff) {
                    bestDiff = Math.abs(relLen - targetRelLen);
                    bestEdgeIdx = k;
                }
            }
            if (bestEdgeIdx === -1) return null;

            const pA = rel[bestEdgeIdx];
            const pB = rel[(bestEdgeIdx + 1) % n];
            const edgeVecX = pB.x - pA.x;
            const edgeVecY = pB.y - pA.y;

            // 两种方向
            const angle1 = Math.atan2(targetDirY, targetDirX) - Math.atan2(edgeVecY, edgeVecX);
            const cos1 = Math.cos(angle1);
            const sin1 = Math.sin(angle1);
            const rotAx1 = pA.x * cos1 - pA.y * sin1;
            const rotAy1 = pA.x * sin1 + pA.y * cos1;
            const cx1 = v2.x - rotAx1 * BASE_SCALE;
            const cy1 = v2.y - rotAy1 * BASE_SCALE;
            const worldVerts1 = rel.map(v => {
                const rx = v.x * cos1 - v.y * sin1;
                const ry = v.x * sin1 + v.y * cos1;
                return { x: cx1 + rx * BASE_SCALE, y: cy1 + ry * BASE_SCALE };
            });

            const angle2 = Math.atan2(-targetDirY, -targetDirX) - Math.atan2(edgeVecY, edgeVecX);
            const cos2 = Math.cos(angle2);
            const sin2 = Math.sin(angle2);
            const rotAx2 = pA.x * cos2 - pA.y * sin2;
            const rotAy2 = pA.x * sin2 + pA.y * cos2;
            const cx2 = v1.x - rotAx2 * BASE_SCALE;
            const cy2 = v1.y - rotAy2 * BASE_SCALE;
            const worldVerts2 = rel.map(v => {
                const rx = v.x * cos2 - v.y * sin2;
                const ry = v.x * sin2 + v.y * cos2;
                return { x: cx2 + rx * BASE_SCALE, y: cy2 + ry * BASE_SCALE };
            });

            const oldCenter = getCenter(verts);
            const center1 = getCenter(worldVerts1);
            const center2 = getCenter(worldVerts2);
            const dist1 = Math.hypot(center1.cx - oldCenter.cx, center1.cy - oldCenter.cy);
            const dist2 = Math.hypot(center2.cx - oldCenter.cx, center2.cy - oldCenter.cy);
            return dist1 > dist2 ? worldVerts1 : worldVerts2;
        } else {
            // 不允许旋转：要求形状的边与目标边平行且长度匹配（增加角度容差）
            const eps = 0.087; // 约5°的弧度容差
            for (let k = 0; k < n; k++) {
                const a = rel[k];
                const b = rel[(k + 1) % n];
                const relLen = Math.hypot(b.x - a.x, b.y - a.y);
                const shapeWorldLen = relLen * BASE_SCALE;
                if (Math.abs(shapeWorldLen - targetLen) / targetLen > tolerance) continue;

                const shapeDirX = b.x - a.x;
                const shapeDirY = b.y - a.y;
                // 计算方向向量夹角（世界坐标）
                const shapeWorldX = shapeDirX * BASE_SCALE;
                const shapeWorldY = shapeDirY * BASE_SCALE;
                // 计算两个向量的单位点积
                const dot = (shapeWorldX * targetDirX + shapeWorldY * targetDirY) / (shapeWorldLen * targetLen);
                // 允许方向相同或相反（点积接近±1）
                if (Math.abs(Math.abs(dot) - 1) > eps) continue;

                // 判断是正向还是反向，确定对应方式
                if (dot > 0) {
                    // 同向：形状的边方向与目标边相同，应使a与v2重合，b与v1重合
                    const cx = v2.x - a.x * BASE_SCALE;
                    const cy = v2.y - a.y * BASE_SCALE;
                    const worldVerts = rel.map(v => ({
                        x: cx + v.x * BASE_SCALE,
                        y: cy + v.y * BASE_SCALE
                    }));
                    return worldVerts;
                } else {
                    // 反向：形状的边方向与目标边相反，应使a与v1重合，b与v2重合
                    const cx = v1.x - a.x * BASE_SCALE;
                    const cy = v1.y - a.y * BASE_SCALE;
                    const worldVerts = rel.map(v => ({
                        x: cx + v.x * BASE_SCALE,
                        y: cy + v.y * BASE_SCALE
                    }));
                    return worldVerts;
                }
            }
            return null;
        }
    }

    // 手动放置：寻找最近边的中点
    function manualPlaceAt(mx, my) {
        if (placedPolygons.length === 0) {
            // 第一个多边形放在鼠标位置
            let worldVerts, color;
            if (currentType === 'specialA') {
                worldVerts = relToWorld(currentVertices, mx, my, 0);
                color = "#F9CB9C"; // 橙色
            } else if (currentType === 'specialB') {
                const rotAngle = currentRotIndex * 2 * Math.PI / 3;
                const rotated = rotateVertices(currentVertices, rotAngle);
                worldVerts = relToWorld(rotated, mx, my, 0);
                if (currentRotIndex === 0) color = "#F9CB9C";
                else if (currentRotIndex === 1) color = "#6FA8DC";
                else color = "#B4A7D6";
            } else {
                worldVerts = relToWorld(currentVertices, mx, my, 0);
                // 使用循环颜色数组
                const colors = ['#f9d5a3','#b8d9f0','#c5e0b4','#f4b8a4','#d3b5e8','#f9e0a0','#b0d9b1','#f1b6c1','#b2c8e8','#d6c8b0'];
                color = colors[0]; // 三角形，取第一个
            }
            placedPolygons.push({ worldVerts, color });
            drawMainCanvas();
            return true;
        }

        let bestDist = Infinity;
        let bestPoly = null;
        let bestEdge = -1;
        for (let p of placedPolygons) {
            for (let i = 0; i < p.worldVerts.length; i++) {
                const v1 = p.worldVerts[i];
                const v2 = p.worldVerts[(i+1) % p.worldVerts.length];
                const midX = (v1.x + v2.x) / 2;
                const midY = (v1.y + v2.y) / 2;
                const d = Math.hypot(midX - mx, midY - my);
                if (d < bestDist) {
                    bestDist = d;
                    bestPoly = p;
                    bestEdge = i;
                }
            }
        }
        if (bestPoly && bestEdge !== -1) {
            let shapeToPlace = currentVertices;
            let allowRotation = true;
            let color;
            if (currentType === 'specialA') {
                allowRotation = true;
                color = "#F9CB9C";
            } else if (currentType === 'specialB') {
                const rotAngle = currentRotIndex * 2 * Math.PI / 3;
                shapeToPlace = rotateVertices(currentVertices, rotAngle);
                allowRotation = false;
                if (currentRotIndex === 0) color = "#F9CB9C";
                else if (currentRotIndex === 1) color = "#6FA8DC";
                else color = "#B4A7D6";
            } else {
                // 普通类型，从 colors 数组按已有数量取色
                const colors = ['#f9d5a3','#b8d9f0','#c5e0b4','#f4b8a4','#d3b5e8','#f9e0a0','#b0d9b1','#f1b6c1','#b2c8e8','#d6c8b0'];
                color = colors[placedPolygons.length % colors.length];
            }
            const w = placeOnEdge(bestPoly, bestEdge, shapeToPlace, allowRotation);
            if (w) {
                placedPolygons.push({ worldVerts: w, color });
                drawMainCanvas();
                return true;
            }
        }
        return false;
    }

    function undo() {
        if (placedPolygons.length > 0) {
            placedPolygons.pop();
            drawMainCanvas();
        } else alert('没有可撤销的多边形');
    }

    function clearAll() {
        placedPolygons = [];
        drawMainCanvas();
    }

    // ---------- 事件绑定 ----------
    btnTriangle.addEventListener('click', () => setPolygonType('triangle'));
    btnQuad.addEventListener('click', () => setPolygonType('quad'));
    btnSpecialHexA.addEventListener('click', () => setPolygonType('specialA'));
    btnSpecialHexB.addEventListener('click', () => setPolygonType('specialB'));

    normalizeBtn.addEventListener('click', normalizePolygon);

    undoBtn.addEventListener('click', undo);
    clearBtn.addEventListener('click', clearAll);

    rotate0.addEventListener('click', () => {
        if (currentType === 'specialB') {
            currentRotIndex = 0;
            updateRotateButtons();
        }
    });
    rotate120.addEventListener('click', () => {
        if (currentType === 'specialB') {
            currentRotIndex = 1;
            updateRotateButtons();
        }
    });
    rotate240.addEventListener('click', () => {
        if (currentType === 'specialB') {
            currentRotIndex = 2;
            updateRotateButtons();
        }
    });

    mainCanvas.addEventListener('click', (e) => {
        const rect = mainCanvas.getBoundingClientRect();
        const scaleX = mainCanvas.width / rect.width;
        const scaleY = mainCanvas.height / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;
        if (!manualPlaceAt(mouseX, mouseY)) {
            alert('无法在点击位置放置多边形');
        }
    });

    // 小画布拖拽
    editCanvas.addEventListener('mousedown', (e) => {
        const rect = editCanvas.getBoundingClientRect();
        const scale = editCanvas.width / rect.width;
        const mouseX = (e.clientX - rect.left) * scale;
        const mouseY = (e.clientY - rect.top) * scale;
        const relX = (mouseX - 100) / 70;
        const relY = (mouseY - 100) / 70;
        let minDist = 20;
        dragIndex = -1;
        currentVertices.forEach((v, i) => {
            const d = Math.hypot(v.x - relX, v.y - relY);
            if (d < minDist) { minDist = d; dragIndex = i; }
        });
        if (dragIndex !== -1) { dragging = true; e.preventDefault(); }
    });

    editCanvas.addEventListener('mousemove', (e) => {
        if (!dragging || dragIndex === -1) return;
        const rect = editCanvas.getBoundingClientRect();
        const scale = editCanvas.width / rect.width;
        const mouseX = (e.clientX - rect.left) * scale;
        const mouseY = (e.clientY - rect.top) * scale;
        const relX = (mouseX - 100) / 70;
        const relY = (mouseY - 100) / 70;
        currentVertices[dragIndex] = { x: Math.max(-1.2, Math.min(1.2, relX)), y: Math.max(-1.2, Math.min(1.2, relY)) };
        drawEditCanvas();
    });

    window.addEventListener('mouseup', () => { dragging = false; dragIndex = -1; });

    // 初始化：放置一个三角形作为起点
    (function init() {
        currentVertices = generateRegularPolygon(3);
        currentSides = 3;
        updateActiveButton('triangle');
        drawEditCanvas();
        const worldVerts = relToWorld(currentVertices, MAIN_WIDTH/2, MAIN_HEIGHT/2, 0);
        const colors = ['#f9d5a3','#b8d9f0','#c5e0b4','#f4b8a4','#d3b5e8','#f9e0a0','#b0d9b1','#f1b6c1','#b2c8e8','#d6c8b0'];
        placedPolygons.push({ worldVerts, color: colors[0] });
        drawMainCanvas();
    })();
})();
</script>
